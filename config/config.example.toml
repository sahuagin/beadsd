# Shared beadsd defaults — install at ~/.config/beadsd/config.toml
# (layered UNDER each per-instance config; per-instance files override these).
#
# Every field is optional; these are the built-in defaults shown explicitly.

# Path to the REAL br binary. If you install the transparent `br` shim (see
# DEPLOY.md), this MUST point at the real binary (e.g. ~/.local/bin/br-real),
# NOT at "br" — otherwise the server would invoke the shim and recurse. Without
# the shim, bare "br" is fine (the rc.d puts ~/.local/bin on PATH).
br_bin = "/home/tcovert/.local/bin/br-real"

# Debounced snapshot-commit interval in seconds (0 disables the committer).
commit_interval_secs = 30

# HTTP mount points.
mcp_path = "/mcp"
health_path = "/health"

# Identity for snapshot commits. No PII — the central repo may be public.
git_author_name = "beadsd"
git_author_email = "beadsd@localhost"

# A default bind; per-instance configs set a concrete ip:port.
listen = "0.0.0.0:7777"

# Allowed inbound `Host` headers (rmcp validation). EMPTY (the default) allows
# ANY Host — correct for a trusted-network bind, where remote clients connect by
# the server's LAN IP/hostname. rmcp's own default is localhost-only, which
# silently 403s every remote client even on a 0.0.0.0 bind; leaving this empty
# avoids that. To lock down a public bind, list the allowed authorities:
#   allowed_hosts = ["beads.example.com", "beads.example.com:7772"]
allowed_hosts = []
